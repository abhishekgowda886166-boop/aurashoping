<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-primary" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#22d3ee" />
      <stop offset="100%" stopColor="#0891b2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Hexagon Outer Boundary -->
  <polygon 
    points="256,40 460,158 460,394 256,512 52,394 52,158" 
    stroke="url(#grad-primary)" 
    stroke-width="24" 
    stroke-linejoin="round"
    fill="rgba(8, 145, 178, 0.05)"
  />
  
  <!-- Glowing "A" Shape -->
  <path 
    d="M256,120 L370,340 M256,120 L142,340" 
    stroke="url(#grad-primary)" 
    stroke-width="24" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    filter="url(#glow)"
  />
  <line 
    x1="185" 
    y1="270" 
    x2="327" 
    y2="270" 
    stroke="url(#grad-primary)" 
    stroke-width="20" 
    stroke-linecap="round"
    filter="url(#glow)"
  />
  
  <!-- Inner Glow Triangle -->
  <path 
    d="M256,120 L370,340 L142,340 Z" 
    fill="url(#grad-primary)" 
    fill-opacity="0.1"
  />

  <!-- Central Glowing Sphere -->
  <circle 
    cx="256" 
    cy="256" 
    r="36" 
    fill="#ffffff" 
    filter="url(#glow)"
  />
</svg>
